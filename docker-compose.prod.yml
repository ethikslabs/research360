services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: research360
      POSTGRES_USER: research360
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research360"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://research360:${POSTGRES_PASSWORD}@postgres:5432/research360
      REDIS_URL: redis://redis:6379
      AWS_REGION: ap-southeast-2
      S3_BUCKET: ${S3_BUCKET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      UNSTRUCTURED_API_KEY: ${UNSTRUCTURED_API_KEY:-not-set}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "8081:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
