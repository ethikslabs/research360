name: Deploy research360

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'docker-compose.prod.yml'
      - 'deploy.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION:   ap-southeast-2
  S3_BUCKET:    ethikslabs-core
  S3_PREFIX:    deploy/research360
  EC2_INSTANCE: i-010dc648d4676168e

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 sync . s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/ \
            --exclude ".git/*" \
            --exclude "node_modules/*" \
            --exclude "api/node_modules/*" \
            --exclude "frontend/node_modules/*" \
            --exclude ".DS_Store" \
            --region ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        id: ssm-command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ env.EC2_INSTANCE }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["bash /home/ec2-user/research360/deploy.sh 2>&1"]' \
            --region ${{ env.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Wait for deploy
        id: wait-deploy
        run: |
          COMMAND_ID=${{ steps.ssm-command.outputs.command_id }}
          START_TIME=$SECONDS
          for i in {1..30}; do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID --instance-id ${{ env.EC2_INSTANCE }} \
              --region ${{ env.AWS_REGION }} --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Status: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              DURATION=$(( SECONDS - START_TIME ))
              echo "duration_s=$DURATION" >> $GITHUB_OUTPUT
              echo "deploy_status=success" >> $GITHUB_OUTPUT
              exit 0
            fi
            if [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" ]]; then
              aws ssm get-command-invocation --command-id $COMMAND_ID \
                --instance-id ${{ env.EC2_INSTANCE }} --region ${{ env.AWS_REGION }} \
                --query "StandardErrorContent" --output text
              DURATION=$(( SECONDS - START_TIME ))
              echo "duration_s=$DURATION" >> $GITHUB_OUTPUT
              echo "deploy_status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
          done
          echo "deploy_status=failed" >> $GITHUB_OUTPUT
          echo "Timed out." && exit 1

      - name: Notify ARGUS
        if: always()
        run: |
          NOC_SECRET=$(aws ssm get-parameter \
            --name /ethikslabs/argus/noc-secret \
            --with-decryption \
            --region ${{ env.AWS_REGION }} \
            --query "Parameter.Value" --output text)
          curl -s -X POST https://ethikslabs.com/argus-api/api/deploy-notify \
            -H "Content-Type: application/json" \
            -H "x-argus-noc-secret: $NOC_SECRET" \
            -d "{\"repo\":\"research360\",\"status\":\"${{ steps.wait-deploy.outputs.deploy_status }}\",\"duration_s\":${{ steps.wait-deploy.outputs.duration_s || 0 }}}" \
            || echo "ARGUS notify failed (non-blocking)"
